name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type-check & lint ──────────────────────────────────────────────────────
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (dashboard)
        run: npm run type-check
        working-directory: apps/dashboard

      - name: Type-check (pwa)
        run: npm run type-check
        working-directory: apps/pwa

      - name: Type-check (shared)
        run: npm run type-check
        working-directory: packages/shared

      - name: Lint (dashboard)
        run: npm run lint
        working-directory: apps/dashboard

      - name: Lint (pwa)
        run: npm run lint
        working-directory: apps/pwa

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (shared)
        run: npm test
        working-directory: packages/shared

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    env:
      # Minimal placeholder env vars so Next.js build doesn't fail
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder_publishable_key
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
      ANTHROPIC_API_KEY: sk-ant-placeholder
      RESEND_API_KEY: re_placeholder
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder_token
      NEXT_PUBLIC_DASHBOARD_URL: http://localhost:3000
      NEXT_PUBLIC_PWA_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate brand icons
        run: node scripts/generate-icons.mjs

      - name: Build dashboard
        run: npm run build
        working-directory: apps/dashboard

      - name: Build pwa
        run: npm run build
        working-directory: apps/pwa

  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true  # warn only until baseline is established
